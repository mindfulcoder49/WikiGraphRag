# fly.toml — WikiGraphRAG
# Replace "your-app-name" with the name you chose when running `fly launch`.
app = "alcivartech-wikigraphrag"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    timeout = "10s"
    path = "/api/builds"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
